<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>六级单词拼写游戏</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url(./img/bg.jpg) no-repeat center/cover;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }
        /* 抽屉导航样式 */
        #drawer-toggle {
            position: fixed;
            left: 30px;
            top: 30px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(76, 175, 80, 0.9);
            border-radius: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #drawer-menu {
            position: fixed;
            left: -300px;
            top: 0;
            height: 100vh;
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drawer-open #drawer-menu {
            left: 0;
        }

        .menu-item {
            padding: 18px;
            margin: 12px 0;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 12px;
            color: #4CAF50;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            background: rgba(76, 175, 80, 0.2);
            transform: translateX(10px);
        }

        /* 游戏容器 */
        #game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 游戏标题 */
        h1 {
            text-align: center;
            color: #4CAF50;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        /* 拼写游戏区域 */
        .spell-game {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 8px 32px rgba(76, 175, 80, 0.1);
        }

        /* 中文提示 */
        .spell-chinese {
            font-size: 24px;
            color: #4CAF50;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 拼写输入框 */
        .spell-input {
            font-size: 28px;
            padding: 15px;
            border: 3px solid #4CAF50;
            border-radius: 10px;
            width: 100%;
            text-align: center;
            margin-bottom: 30px;
        }

        /* 拼写按钮 */
        .spell-buttons {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 10px;
            max-width: 500px;
            margin: 0 auto 30px;
        }

        .spell-btn {
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .spell-btn:hover {
            background: #45a049;
            transform: scale(1.05);
        }

        .spell-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 结果提示 */
        .spell-result {
            font-size: 20px;
            margin-top: 20px;
            font-weight: bold;
            text-align: center;
        }

        .spell-result.correct {
            color: #4cd137;
        }

        .spell-result.incorrect {
            color: #4CAF50;
        }

        /* 操作按钮 */
        .spell-actions {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .action-btn {
            padding: 14px 32px;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .action-btn.primary {
            background: #4cd137;
            color: white;
        }

        .action-btn.secondary {
            background: #4CAF50;
            color: white;
        }

        .action-btn:hover {
            transform: scale(1.05);
        }

        /* 关闭按钮 */
        .close-game {
            position: fixed;
            top: 30px;
            right: 40px;
            font-size: 28px;
            color: #4CAF50;
            cursor: pointer;
            z-index: 1000;
        }

        /* 信息提示 */
        #game-info {
            text-align: center;
            margin-bottom: 20px;
            color: #4CAF50;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <button id="drawer-toggle">☰</button>
    <div id="drawer-menu">
        <div class="menu-item" onclick="goToErrorCollection()">📚 错题集</div>
        <div class="menu-item" onclick="goToDataAnalysis()">📊 数据分析</div>
        <div class="menu-item" onclick="location.href='学习笔记.html'">📒 学习笔记</div>
        <div class="menu-item" onclick="goToMainPage()">⚙️ 返回</div>
    </div>

    <div id="game-container">
        <h1>✏️ 六级单词拼写游戏</h1>
        <div id="game-info">正在加载单词...</div>
        <div class="spell-game">
            <div class="spell-chinese" id="spellChinese">请拼写：</div>
            <input type="text" class="spell-input" id="spellInput" oninput="checkSpell()">
            <div class="spell-buttons" id="spellButtons"></div>
            <div class="spell-result" id="spellResult"></div>
            <div class="spell-actions">
                <button class="action-btn secondary" onclick="clearInput()">清除</button>
                <button class="action-btn primary" onclick="checkWord()">确定</button>
                <button class="action-btn primary" onclick="nextSpellWord()">下一个</button>
            </div>
        </div>
    </div>

    <div class="close-game" onclick="closeGame()">✕</div>

    <script>
        const CONFIG = { dataURL: '999/CET6_1.json' };
        let knownWords = JSON.parse(localStorage.getItem('knownWords_cet6') || '[]');
        let currentSpellWord = null;
        let currentSpellIndex = 0;
        let spellWords = [];

        // 初始化游戏
        async function initGame() {
            try {
                // 确保我们有最新的已知单词列表
                knownWords = JSON.parse(localStorage.getItem('knownWords_cet6') || '[]');
                
                if (knownWords.length < 2) {
                    document.getElementById('game-info').innerText = '需要至少学习2个单词才能开始游戏！';
                    return;
                }

                // 每次使用10个单词
                const maxWords = 10;
                if (knownWords.length > maxWords) {
                    // 随机抽取10个单词
                    spellWords = [...knownWords].sort(() => Math.random() - 0.5).slice(0, maxWords);
                } else {
                    spellWords = [...knownWords];
                }

                currentSpellIndex = 0;
                nextSpellWord();
                document.getElementById('game-info').innerText = `当前进度：${currentSpellIndex + 1}/${spellWords.length}`;
            } catch (e) {
                document.getElementById('game-info').innerText = '加载失败';
            }
        }

        // 生成拼写按钮
        function generateSpellButtons(word) {
            const buttonsContainer = document.getElementById('spellButtons');
            const letters = word.split('');
            // 添加一些干扰字母
            const干扰字母 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            const allLetters = [...letters, ...干扰字母.slice(0, 10)].sort(() => Math.random() - 0.5);
            
            buttonsContainer.innerHTML = allLetters.map(letter => `
                <button class="spell-btn" onclick="addSpellLetter('${letter}')">${letter}</button>
            `).join('');
        }

        // 添加拼写字母
        function addSpellLetter(letter) {
            const input = document.getElementById('spellInput');
            input.value += letter;
            checkSpell();
        }

        // 清除输入
        function clearInput() {
            const input = document.getElementById('spellInput');
            input.value = '';
            document.getElementById('spellResult').textContent = '';
            document.getElementById('spellResult').className = 'spell-result';
        }

        // 检查拼写
        function checkSpell() {
            const input = document.getElementById('spellInput');
            const result = document.getElementById('spellResult');
            
            if (input.value === currentSpellWord.word) {
                result.textContent = '正确！🎉';
                result.className = 'spell-result correct';
                // 禁用所有按钮
                document.querySelectorAll('.spell-btn').forEach(btn => {
                    btn.disabled = true;
                });
            } else {
                result.textContent = '';
                result.className = 'spell-result';
            }
        }

        // 检查单词
        function checkWord() {
            const input = document.getElementById('spellInput');
            const result = document.getElementById('spellResult');
            
            if (input.value.trim() === '') {
                result.textContent = '请填写单词！';
                result.className = 'spell-result incorrect';
            } else if (input.value === currentSpellWord.word) {
                result.textContent = '正确！🎉';
                result.className = 'spell-result correct';
                // 禁用所有按钮
                document.querySelectorAll('.spell-btn').forEach(btn => {
                    btn.disabled = true;
                });
            } else {
                result.textContent = '错误！正确答案是：' + currentSpellWord.word;
                result.className = 'spell-result incorrect';
            }
        }

        // 下一个拼写单词
        function nextSpellWord() {
            if (currentSpellIndex >= spellWords.length) {
                alert('所有单词都拼写完成！🎉');
                closeGame();
                return;
            }
            
            currentSpellWord = spellWords[currentSpellIndex];
            currentSpellIndex++;
            
            const translations = currentSpellWord.translations.map(tran => `${tran.translation} (${tran.type})`).join(', ');
            document.getElementById('spellChinese').textContent = `请拼写：${translations}`;
            document.getElementById('spellInput').value = '';
            document.getElementById('spellResult').textContent = '';
            document.getElementById('spellResult').className = 'spell-result';
            
            generateSpellButtons(currentSpellWord.word);
            document.getElementById('game-info').innerText = `当前进度：${currentSpellIndex}/${spellWords.length}`;
        }

        // 关闭游戏
        function closeGame() {
            // 返回主页面
            location.href = 'cet6.html';
        }

        // 导航
        function goToErrorCollection(){location.href="错题集.html"}
        function goToDataAnalysis(){location.href="数据分析.html"}
        function goToMainPage(){location.href="cet6.html"}

        // 事件
        function setupEventListeners() {
            document.getElementById('drawer-toggle').onclick = () => {
                document.body.classList.toggle('drawer-open');
            };
        }

        // 初始化
        initGame();
        setupEventListeners();
    </script>
</body>
</html>
