<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>错题集 - Error Collection</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: url(./img/bg.jpg) no-repeat center/cover;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            padding-top: 80px;
        }

        /* 抽屉导航样式 */
        #drawer-toggle {
            position: fixed;
            left: 30px;
            top: 30px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border: none;
            background: rgba(255, 193, 7, 0.9);
            border-radius: 15px;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }

        #drawer-menu {
            position: fixed;
            left: -300px;
            top: 0;
            height: 100vh;
            width: 280px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            padding: 30px 20px;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .drawer-open #drawer-menu {
            left: 0;
        }

        .menu-item {
            padding: 18px;
            margin: 12px 0;
            background: rgba(255, 193, 7, 0.1);
            border-radius: 12px;
            color: #FFA000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-item:hover {
            background: rgba(255, 193, 7, 0.2);
            transform: translate10px);
        }

        /* 主内容容器 */
        .main-container {
            width: 70%;
            margin: 40px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        /* 错题卡片 */
        .error-card {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(255, 193, 7, 0.1);
            transition: transform 0.3s ease;
        }

        .error-card:hover {
            transform: translateY(-5px);
        }

        .word {
            font-size: 2.2rem;
            color: #FFA000;
            margin-bottom: 10px;
        }

        .meta {
            color: #666;
            font-size: 0.9rem;
            margin: 8px 0;
        }

        .section-title {
            font-size: 2rem;
            color: #FFA000;
            margin-bottom: 30px;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(255, 193, 7, 0.2);
        }

        /* AI交互区域样式 */
        .ai-section {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(255, 193, 7, 0.1);
            margin-top: 30px;
        }

        .ai-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .ai-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #FFA000, #FF6B00);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            margin-right: 15px;
        }

        .ai-title {
            font-size: 1.5rem;
            color: #FFA000;
            font-weight: 600;
        }

        .ai-chat-container {
            max-height: 300px;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(255, 193, 7, 0.05);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .ai-chat-container:hover {
            box-shadow: inset 0 0 10px rgba(255, 193, 7, 0.1);
        }

        /* 滚动条样式 */
        .ai-chat-container::-webkit-scrollbar {
            width: 8px;
        }

        .ai-chat-container::-webkit-scrollbar-track {
            background: rgba(255, 193, 7, 0.1);
            border-radius: 10px;
        }

        .ai-chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 193, 7, 0.5);
            border-radius: 10px;
        }

        .ai-chat-container::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 193, 7, 0.7);
        }

        .ai-message {
            background: rgba(255, 193, 7, 0.1);
            padding: 12px 16px;
            border-radius: 18px 18px 18px 0;
            margin-bottom: 10px;
            max-width: 80%;
            align-self: flex-start;
            animation: messageIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .user-message {
            background: rgba(255, 193, 7, 0.2);
            padding: 12px 16px;
            border-radius: 18px 18px 0 18px;
            margin-bottom: 10px;
            max-width: 80%;
            align-self: flex-end;
            margin-left: auto;
            animation: messageIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes messageIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .ai-input-container {
            display: flex;
            gap: 10px;
        }

        .ai-input {
            flex: 1;
            padding: 15px;
            border: 2px solid rgba(255, 193, 7, 0.3);
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }

        .ai-input:focus {
            border-color: #FFA000;
            box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.1);
        }

        .ai-submit-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #FFA000, #FF6B00);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ai-submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 193, 7, 0.4);
        }

        .ai-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .loading-indicator {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 768px) {
            .main-container {
                grid-template-columns: 1fr;
                width: 90%;
            }
        }
    </style>
</head>
<body>
    <!-- 抽屉导航 -->
    <button id="drawer-toggle">☰</button>
    <div id="drawer-menu">
        <div class="menu-item" onclick="location.href='cet4.html'">📘 CET-4 四级</div>
        <div class="menu-item" onclick="location.href='cet6.html'">📗 CET-6 六级</div>
        <div class="menu-item" onclick="location.href='考研单词.html'">🎓 考研词汇</div>
        <div class="menu-item" onclick="history.back()">🔙 返回上级</div>
    </div>

    <!-- 主内容 -->
    <div class="main-container">
        <!-- 错题列表 -->
        <div>
            <h2 class="section-title">错题记录 Error Records</h2>
            <div id="error-list"></div>
        </div>
    </div>

    <!-- AI交互区域 -->
    <div class="main-container">
        <div class="ai-section">
            <div class="ai-header">
                <div class="ai-icon">🤖</div>
                <div class="ai-title">AI 学习助手</div>
            </div>
            <div class="ai-chat-container" id="ai-chat-container">
                <div class="ai-message">你好！我是你的AI学习助手，有什么可以帮助你的吗？</div>
            </div>
            <div class="ai-input-container">
                <input type="text" class="ai-input" id="ai-input" placeholder="输入你的问题...">
                <button class="ai-submit-btn" id="ai-submit-btn">发送</button>
            </div>
            <div class="ai-analysis-container" style="margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 193, 7, 0.2);">
                <button class="ai-analysis-btn" id="ai-analysis-btn" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #FFA000, #FF6B00); border: none; border-radius: 25px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease;">
                    📊 分析薄弱环节
                </button>
            </div>
        </div>
    </div>

    <script>
// ===================== 后端接口地址（固定不要改）=====================
const API_BASE = "https://wordplanet-api.deno.dev/api";
// ==================================================================

        // 加载云端错题（不改变样式）
        async function loadWrongWords() {
            const user = localStorage.getItem("currentUser");
            const container = document.getElementById("error-list");
            if (!user) {
                container.innerHTML = `<div class="error-card">请先登录查看错题集 ~</div>`;
                return;
            }

            try {
                const res = await fetch(API_BASE + "/get-wrong?username=" + user);
                const list = await res.json();
                if (list.length === 0) {
                    container.innerHTML = `<div class="error-card">📚 当前没有错题记录 ~</div>`;
                    return;
                }

                // 渲染错题列表（原有样式不变）
                container.innerHTML = list.map(item => `
                  <div class="error-card">
                    <div class="word">${item.word}</div>
                    <div class="meta">分类: ${item.category || '未分类'}</div>
                    <div class="meta">时间: ${new Date(item.timestamp).toLocaleString()}</div>
                  </div>`).join('');
            } catch (e) {
                container.innerHTML = `<div class="error-card">错题加载失败，请重试 ~</div>`;
            }
        }

        // 初始化加载
        loadWrongWords();

        // 抽屉交互
        document.getElementById('drawer-toggle').addEventListener('click', () => {
            document.body.classList.toggle('drawer-open');
        });

        // AI交互功能（保持原有逻辑不变）
        document.addEventListener('DOMContentLoaded', function() {
            const aiInput = document.getElementById('ai-input');
            const aiSubmitBtn = document.getElementById('ai-submit-btn');
            const aiChatContainer = document.getElementById('ai-chat-container');

            // 缓存机制
            const responseCache = new Map();
            const CACHE_EXPIRY = 24 * 60 * 60 * 1000; // 24小时缓存

            // 预加载常用问题
            const commonQuestions = ['你好', '怎么学习英语', '单词记不住怎么办'];

            // 预加载函数
            async function preloadResponses() {
                console.log('开始预加载常用问题...');
                for (const question of commonQuestions) {
                    setTimeout(async () => {
                        try {
                            const response = await callDoubaoAPI(question);
                            responseCache.set(question, {
                                response: response,
                                timestamp: Date.now()
                            });
                            console.log(`预加载完成: ${question}`);
                        } catch (error) {
                            console.log(`预加载失败: ${question}`, error);
                        }
                    }, 1000 * commonQuestions.indexOf(question));
                }
            }

            // 启动预加载
            preloadResponses();

            // 发送消息函数
            async function sendMessage() {
                const message = aiInput.value.trim();
                if (!message) return;

                // 添加用户消息到聊天容器
                addMessage('user', message);
                aiInput.value = '';

                // 检查缓存
                const cached = responseCache.get(message);
                const now = Date.now();

                if (cached && (now - cached.timestamp) < CACHE_EXPIRY) {
                    // 从缓存获取答案
                    addMessage('ai', cached.response);
                    return;
                }

                // 显示加载状态
                aiSubmitBtn.disabled = true;
                aiSubmitBtn.innerHTML = '<div class="loading-indicator"></div>';

                try {
                    // 调用豆包API
                    const response = await callDoubaoAPI(message);

                    // 缓存结果
                    responseCache.set(message, {
                        response: response,
                        timestamp: Date.now()
                    });

                    // 添加AI回复到聊天容器
                    addMessage('ai', response);
                } catch (error) {
                    console.error('API调用失败:', error);
                    addMessage('ai', '抱歉，暂时无法处理你的请求，请稍后再试。');
                } finally {
                    // 恢复按钮状态
                    aiSubmitBtn.disabled = false;
                    aiSubmitBtn.innerHTML = '发送';
                }
            }

            // 添加消息到聊天容器
            function addMessage(type, content) {
                const messageDiv = document.createElement('div');
                messageDiv.className = type === 'user' ? 'user-message' : 'ai-message';
                messageDiv.textContent = content;
                aiChatContainer.appendChild(messageDiv);
                // 滚动到底部
                aiChatContainer.scrollTop = aiChatContainer.scrollHeight;
            }

            // 调用豆包API（保持原有逻辑不变）
            async function callDoubaoAPI(message) {
                const apiKey = '7ec1fc34-50ae-42bf-84b1-6c7eb9c2d23f';
                const apiUrl = 'https://ark.cn-beijing.volces.com/api/v3/chat/completions';

                const requestData = {
                    model: 'doubao-seed-2-0-mini-260215',
                    messages: [
                        {
                            role: 'system',
                            content: '你是一个英语学习助手，帮助用户解决英语学习中的问题，特别是关于单词记忆和错题解析。请使用简洁明了的语言回答，重点突出，便于理解。回答要简洁，控制在100字以内。'
                        },
                        {
                            role: 'user',
                            content: message
                        }
                    ],
                    temperature: 0.3,
                    max_tokens: 200,
                    top_p: 0.7,
                    stream: false
                };

                try {
                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${apiKey}`
                        },
                        body: JSON.stringify(requestData)
                    });

                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(`API请求失败: ${response.status} - ${errorData.error?.message || '未知错误'}`);
                    }

                    const data = await response.json();
                    return data.choices[0].message.content;
                } catch (error) {
                    console.error('API调用错误:', error);
                    if (error.message.includes('401')) {
                        return 'API密钥无效，请检查你的API密钥配置。';
                    } else if (error.message.includes('404')) {
                        return 'API端点错误，请检查API地址配置。';
                    } else if (error.message.includes('网络')) {
                        return '网络连接失败，请检查你的网络连接。';
                    } else if (error.message.includes('CORS')) {
                        return '跨域请求错误，请在服务器环境中运行或配置CORS。';
                    } else {
                        return `抱歉，暂时无法处理你的请求。错误信息：${error.message}`;
                    }
                }
            }

            // 错题分析功能
            const aiAnalysisBtn = document.getElementById('ai-analysis-btn');

            aiAnalysisBtn.addEventListener('click', async function() {
                const user = localStorage.getItem("currentUser");
                if (!user) {
                    addMessage('ai', '请先登录后查看薄弱环节分析~');
                    return;
                }

                try {
                    const res = await fetch(API_BASE + "/get-wrong?username=" + user);
                    const errors = await res.json();

                    if (errors.length === 0) {
                        addMessage('ai', '你目前还没有错题记录，快去练习吧！当你有错题后，我可以帮你分析薄弱环节。');
                        return;
                    }

                    // 显示分析中状态
                    aiAnalysisBtn.disabled = true;
                    aiAnalysisBtn.innerHTML = '<div class="loading-indicator" style="width: 16px; height: 16px; border-width: 2px;"></div> 分析中...';

                    // 统计错题数据
                    const analysisData = analyzeErrorData(errors);

                    // 构建分析提示词
                    const analysisPrompt = buildAnalysisPrompt(analysisData);

                    // 添加用户消息
                    addMessage('user', '请帮我分析我的薄弱环节');

                    // 调用AI分析
                    const response = await callDoubaoAPI(analysisPrompt);
                    addMessage('ai', response);
                } catch (error) {
                    console.error('分析失败:', error);
                    addMessage('ai', '分析过程中出现错误，请稍后再试。');
                } finally {
                    // 恢复按钮状态
                    aiAnalysisBtn.disabled = false;
                    aiAnalysisBtn.innerHTML = '📊 分析薄弱环节';
                }
            });

            // 统计错题数据
            function analyzeErrorData(errors) {
                const categoryCount = {};
                const wordList = [];
                const timeDistribution = {};

                errors.forEach(error => {
                    // 统计分类
                    const category = error.category || '未分类';
                    categoryCount[category] = (categoryCount[category] || 0) + 1;

                    // 收集单词
                    wordList.push({
                        word: error.word,
                        definition: error.definition || '',
                        category: category
                    });

                    // 时间分布（按天统计）
                    const date = new Date(error.timestamp).toLocaleDateString();
                    timeDistribution[date] = (timeDistribution[date] || 0) + 1;
                });

                return {
                    totalErrors: errors.length,
                    categoryCount: categoryCount,
                    wordList: wordList,
                    timeDistribution: timeDistribution
                };
            }

            // 构建分析提示词
            function buildAnalysisPrompt(data) {
                let prompt = '请作为英语学习专家，根据以下错题数据，分析用户的薄弱环节并给出学习建议。\n\n';
                prompt += `错题总数：${data.totalErrors} 个\n\n`;

                // 分类统计
                prompt += '【分类统计】\n';
                for (const [category, count] of Object.entries(data.categoryCount)) {
                    const percentage = ((count / data.totalErrors) * 100).toFixed(1);
                    prompt += `- ${category}: ${count} 个 (${percentage}%)\n`;
                }
                prompt += '\n';

                // 错题单词列表
                prompt += '【错题单词】\n';
                data.wordList.forEach((item, index) => {
                    prompt += `${index + 1}. ${item.word}`;
                    if (item.definition) {
                        prompt += ` - ${item.definition}`;
                    }
                    prompt += ` [${item.category}]\n`;
                });
                prompt += '\n';

                // 要求
                prompt += '请提供以下分析：\n';
                prompt += '1. 薄弱环节分析：根据分类统计，指出用户在哪类单词上错误最多\n';
                prompt += '2. 具体建议：针对薄弱环节给出3-5条具体的学习建议\n';
                prompt += '3. 复习计划：建议如何安排复习这些错题\n';
                prompt += '4. 鼓励话语：给用户一些学习鼓励\n\n';
                prompt += '请用友好、鼓励的语气回答，格式清晰易读。';

                return prompt;
            }

            // 事件监听
            aiSubmitBtn.addEventListener('click', sendMessage);
            aiInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
